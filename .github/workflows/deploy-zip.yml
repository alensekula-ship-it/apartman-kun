name: Deploy ZIP Website

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip website
        run: |
          rm -rf site
          mkdir site
          unzip -o website.zip -d site

      - name: Generate busy dates from calendars
        run: |
          python3 - <<'PY'
          import json
          import re
          import urllib.request
          from datetime import datetime, timedelta, timezone

          ICS_URLS = [
              "https://ical.booking.com/v1/export?t=7d329d6a-3b19-4f12-aead-30de1936902f",
              "https://www.airbnb.com/calendar/ical/1459695479210761422.ics?t=8b0f0e57d5cc465aaeb4612c86071e1f&locale=hr"
          ]

          def parse_date(s):
              return datetime.strptime(s[:8], "%Y%m%d").date()

          busy = []

          for url in ICS_URLS:
              try:
                  req = urllib.request.Request(
                      url,
                      headers={
                          "User-Agent": "Mozilla/5.0",
                          "Accept": "*/*"
                      }
                  )

                  text = urllib.request.urlopen(req, timeout=60).read().decode("utf-8", "ignore")

                  text = re.sub(r"\r?\n[ \t]", "", text)

                  for event in text.split("BEGIN:VEVENT")[1:]:

                      ds = re.search(r"DTSTART(?:;[^:\n]*)?:(\d{8})", event)
                      de = re.search(r"DTEND(?:;[^:\n]*)?:(\d{8})", event)

                      if not ds or not de:
                          continue

                      start = parse_date(ds.group(1))
                      end = parse_date(de.group(1))

                      d = start
                      while d < end:
                          busy.append(d.isoformat())
                          d += timedelta(days=1)

                  print("Calendar loaded:", url)

              except Exception as e:
                  print("Calendar skipped:", url, e)

          busy = sorted(set(busy))

          with open("site/busy-dates.json", "w", encoding="utf-8") as f:
              json.dump(
                  {
                      "updated": datetime.now(timezone.utc).isoformat(),
                      "busy": busy
                  },
                  f,
                  ensure_ascii=False,
                  indent=2
              )

          print("Busy dates:", len(busy))
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
